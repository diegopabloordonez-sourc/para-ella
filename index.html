<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>

body{
margin:0;
font-family: 'Arial';
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

.container{
max-width:600px;
padding:30px;
}

h1{
font-size:3em;
margin-bottom:10px;
}

#texto{
font-size:20px;
min-height:60px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
color:#ff4b6e;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.corazon{
position:fixed;
top:-10px;
color:white;
animation: caer linear infinite;
}

@keyframes caer{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Feliz Día de la Mujer ❤️</h1>
  
<img src="foto.jpg" style="width:200px;border-radius:20px;margin:20px;">  

<div id="texto"></div>

<button onclick="sorpresa()">Haz clic aquí</button>

<div id="mensajeFinal"></div>

</div>

<script>

let mensaje="Hoy quiero recordarte lo increíble que eres. Gracias por ser parte de mi vida.";

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,50);
}
}

escribir();

function sorpresa(){

document.getElementById("mensajeFinal").innerHTML=
"<h2>Eres una mujer increíble y me siento muy afortunado de tenerte ❤️</h2>";

}

function corazones(){

let corazon=document.createElement("div");

corazon.classList.add("corazon");

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";

corazon.style.fontSize=(Math.random()*20+10)+"px";

corazon.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},5000);

}

setInterval(corazones,300);

</script>

</body>

</html>
