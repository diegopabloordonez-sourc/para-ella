<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Para ti ❤️</title>

<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
  }

  .container {
    max-width: 600px;
    padding: 30px;
  }

  h1 {
    font-size: 3em;
    margin-bottom: 10px;
  }

  #nombre-animado {
    font-size: 2.5em;
    font-weight: bold;
    color: #ffd1dc;
    margin-bottom: 20px;
    height: 40px;
    letter-spacing: 4px;
  }

  #texto {
    font-size: 20px;
    min-height: 60px;
  }

  button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #ff4b6e;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.1);
  }

  .corazon {
    position: fixed;
    top: -10px;
    color: white;
    animation: caer linear infinite;
  }

  @keyframes caer {
    to {
      transform: translateY(110vh);
    }
  }
</style>

</head>
<body>

<div class="container">

  <h1>❤️ Feliz Día de la Mujer ❤️</h1>

  <div id="nombre-animado"></div>

  <img src="picture.jpeg" style="width:220px;height:220px;border-radius:50%;object-fit:cover;border:5px solid white;margin:20px;" />

  <div id="texto"></div>

  <button onclick="sorpresa()">Haz clic aquí</button>

  <div id="mensajeFinal"></div>

</div>

<!-- Música romántica -->
<audio id="musica" src="https://cdn.pixabay.com/download/audio/2022/03/27/audio_7de8b85470.mp3?filename=romantic-piano-11027.mp3" loop></audio>

<script>
  // Animación para escribir el nombre letra por letra
  const nombre = "Lita Pecas";  // Cambia aquí por el nombre de tu pareja
  const nombreAnimado = document.getElementById("nombre-animado");
  let i = 0;

  function escribirNombre() {
    if (i < nombre.length) {
      nombreAnimado.innerHTML += nombre.charAt(i);
      i++;
      setTimeout(escribirNombre, 200);
    }
  }
  escribirNombre();

  // Mensaje principal que se escribe
  const mensaje = "Hoy quiero recordarte lo increíble que eres. Gracias por ser parte de mi vida.";
  let j = 0;
  const texto = document.getElementById("texto");

  function escribirTexto() {
    if (j < mensaje.length) {
      texto.innerHTML += mensaje.charAt(j);
      j++;
      setTimeout(escribirTexto, 50);
    }
  }
  escribirTexto();

  // Mostrar mensaje sorpresa al hacer clic
  function sorpresa() {
    document.getElementById("mensajeFinal").innerHTML = "<h2>Eres una mujer increíble y me siento muy afortunado de tenerte ❤️</h2>";
  }

  // Animación de corazones cayendo
  function corazones() {
    let corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 10) + "px";
    corazon.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(corazon);
    setTimeout(() => {
      corazon.remove();
    }, 5000);
  }
  setInterval(corazones, 300);

  // Reproducir música al cargar la página (con interacción del usuario por política de navegadores)
  window.addEventListener("click", () => {
    const musica = document.getElementById("musica");
    if (musica.paused) {
      musica.play();
    }
  });
</script>

</body>
</html>
</html>
